#Q4 This GitHub Actions workflow builds and pushes a Docker image to Docker Hub whenever it is manually triggered. It checks out the code, logs in to Docker Hub using secrets for authentication, and then builds and pushes the Docker image with both a "latest" tag and a tag based on the commit SHA.
name: Docker Build and Push
on:
    workflow_dispatch:

        
jobs:
    build-and-push:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v2

            - name: Log in to Docker Hub
              uses: docker/login-action@v2
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }} 
            
            - name: Build and push Docker image
              uses: docker/build-push-action@v2
              with:
                  context: .
                  push: true
                  tags: |
                   ${{ secrets.DOCKER_USERNAME }}/hello-world:latest
                   ${{ secrets.DOCKER_USERNAME }}/hello-world:${{ github.sha }}
                
